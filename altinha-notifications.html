<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GINGA — התראות</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FDFBF7; --bg-outer:#EDE7DB; --green:#2D5A27; --green-2:#3B7233; --mustard:#E6A800; --mustard-2:#C98F00; --coral:#C0603D;
    --ink:#2C3E50; --muted:#6B7789; --line:rgba(44,62,80,.10);
    --glass:rgba(255,255,255,.6); --glass-2:rgba(255,255,255,.8); --glass-brd:rgba(255,255,255,.7);
    --pad:18px; --radius:16px; --shadow:0 8px 26px rgba(44,62,80,.08);
    --header-bg:linear-gradient(160deg, var(--green) 0%, #24471F 100%); --notch:var(--green);
  }
  html[data-theme="dark"]{
    --bg:#0B0C0E; --bg-outer:#060607; --green:#5FA855; --green-2:#6FB865; --mustard:#E9B02A; --mustard-2:#F0BC3E; --coral:#E08157;
    --ink:#EAECEF; --muted:#8B93A0; --line:rgba(255,255,255,.09);
    --glass:rgba(255,255,255,.05); --glass-2:rgba(255,255,255,.08); --glass-brd:rgba(255,255,255,.10);
    --shadow:0 10px 30px rgba(0,0,0,.5); --header-bg:#111318; --notch:#0A0B0D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  body{font-family:'Inter',-apple-system,Segoe UI,Arial,sans-serif; color:var(--ink); background:var(--bg-outer);
    display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:24px 12px}
  h1,h2,h3{font-weight:600}
  svg.lucide{width:1.25em; height:1.25em; stroke-width:2; vertical-align:middle}
  .phone{width:390px; max-width:100%; background:var(--bg); border-radius:38px; overflow:hidden;
    box-shadow:0 30px 70px rgba(44,62,80,.22); position:relative; height:840px; display:flex; flex-direction:column}
  .notch{height:26px; background:var(--notch); position:relative; z-index:30}
  .notch::after{content:""; position:absolute; top:6px; left:50%; transform:translateX(-50%); width:120px; height:18px; background:var(--notch); border-radius:0 0 14px 14px}

  .hdr{display:flex; align-items:center; gap:11px; padding:14px var(--pad); background:var(--header-bg); color:#F3F0E9}
  .hdr .back{cursor:pointer; color:#F3F0E9} .hdr .back svg{width:24px;height:24px}
  .hdr .ttl{font-size:18px; font-weight:600}
  .hdr .mark{margin-inline-start:auto; font-size:12.5px; font-weight:500; color:#F3F0E9; opacity:.9; background:none; border:none; cursor:pointer; font-family:inherit}

  .body{flex:1; overflow-y:auto; padding:10px var(--pad) 20px}
  .body::-webkit-scrollbar{display:none}
  .day{font-size:12.5px; font-weight:600; color:var(--muted); margin:16px 2px 8px}
  .n{display:flex; align-items:center; gap:12px; padding:12px 12px; border-radius:14px; margin-bottom:6px; cursor:pointer}
  .n.unread{background:var(--glass); border:1px solid var(--glass-brd); backdrop-filter:blur(8px)}
  .nic{width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  .nic svg{width:20px;height:20px}
  .ic-circle{background:rgba(45,90,39,.12); color:var(--green)} .ic-kudos{background:rgba(230,168,0,.15); color:var(--mustard-2)}
  .ic-chat{background:rgba(59,114,51,.12); color:var(--green-2)} .ic-challenge{background:rgba(230,168,0,.15); color:var(--mustard-2)}
  .ic-follow{background:rgba(45,90,39,.12); color:var(--green)} .ic-level{background:rgba(192,96,61,.14); color:var(--coral)}
  .ntext{flex:1; font-size:13.5px; line-height:1.45}
  .ntext b{font-weight:600}
  .ntext small{display:block; font-size:11.5px; color:var(--muted); margin-top:2px}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--green); flex:0 0 auto}

  .nav{position:absolute; bottom:0; left:0; right:0; height:70px; background:var(--bg); border-top:1px solid var(--line); display:flex; justify-content:space-around; align-items:center; padding-bottom:6px; z-index:20}
  html[data-theme="dark"] .nav{background:#0A0B0D}
  .nav a{display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; color:var(--muted); text-decoration:none; font-weight:500}
  .nav a svg{width:23px;height:23px}
  .toast{position:absolute; bottom:86px; left:50%; transform:translateX(-50%) translateY(10px); z-index:50; background:#2C3E50; color:#F3F0E9; padding:12px 18px; border-radius:14px; font-size:13.5px; font-weight:500; opacity:0; transition:.3s}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="hdr">
    <a class="back" href="altinha-feed.html"><i data-lucide="chevron-right"></i></a>
    <div class="ttl">התראות</div>
    <button class="mark" onclick="markAll()">סמן הכל כנקרא</button>
  </div>

  <div class="body" id="body"></div>

  <div class="nav">
    <a href="altinha-training.html"><i data-lucide="book-open"></i>תרגול</a>
    <a href="altinha-feed.html"><i data-lucide="activity"></i>פעילות</a>
    <a href="altinha-map.html"><i data-lucide="map-pin"></i>מפה</a>
    <a href="altinha-profile.html"><i data-lucide="user"></i>פרופיל</a>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const $=s=>document.querySelector(s);
function icons(){ if(window.lucide) lucide.createIcons(); }
let NOTIFS=[
  {day:"היום", type:"circle", icon:"user-plus", text:'<b>דניאל</b> הצטרף למעגל שפתחת בחוף גורדון', time:"לפני 8 דק'", unread:true, go:"altinha-map.html"},
  {day:"היום", type:"kudos", icon:"thumbs-up", text:'<b>מאיה</b> ועוד 12 נתנו קודוס להשלמת הסקורפיון שלך', time:"לפני 40 דק'", unread:true, go:"altinha-feed.html"},
  {day:"היום", type:"chat", icon:"message-circle", text:'הודעה חדשה ב<b>מעגל של דניאל</b>', time:"לפני שעה", unread:true, go:"altinha-chat.html"},
  {day:"היום", type:"challenge", icon:"trophy", text:'אתגר השבוע <b>סקורפיון</b> מסתיים בעוד 3 ימים', time:"לפני 3 שעות", unread:false, go:"altinha-challenges.html"},
  {day:"השבוע", type:"follow", icon:"user-plus", text:'<b>שיר</b> התחילה לעקוב אחריך', time:"אתמול", unread:false, go:"altinha-profile.html"},
  {day:"השבוע", type:"level", icon:"zap", text:'עלית ל<b>רמה 3</b> — כל הכבוד!', time:"לפני יומיים", unread:false, go:"altinha-training.html"},
  {day:"השבוע", type:"circle", icon:"map-pin", text:'מעגל חדש נפתח קרוב אליך ב<b>חוף הצוק</b>', time:"לפני 3 ימים", unread:false, go:"altinha-map.html"},
];
function render(){
  const b=$("#body"); b.innerHTML=""; let lastDay=null;
  NOTIFS.forEach((n,i)=>{
    if(n.day!==lastDay){ const d=document.createElement('div'); d.className='day'; d.textContent=n.day; b.appendChild(d); lastDay=n.day; }
    const el=document.createElement('div'); el.className='n'+(n.unread?' unread':'');
    el.innerHTML=`<div class="nic ic-${n.type}"><i data-lucide="${n.icon}"></i></div>
      <div class="ntext">${n.text}<small>${n.time}</small></div>
      ${n.unread?'<div class="dot"></div>':''}`;
    el.onclick=()=>{ n.unread=false; if(n.go) location.href=n.go; else render(); };
    b.appendChild(el);
  });
  icons();
}
render();
function markAll(){ NOTIFS.forEach(n=>n.unread=false); render(); toast('כל ההתראות סומנו כנקראו'); }
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); try{localStorage.setItem('ginga-theme',t)}catch(e){}
  const ic=document.getElementById('themeIc'); if(ic){ ic.setAttribute('data-lucide', t==='dark'?'sun':'moon'); } icons(); }
(function(){ let t='brazil'; try{ t=localStorage.getItem('ginga-theme')||'brazil'; }catch(e){} applyTheme(t); })();
let tT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),1800); }
i
