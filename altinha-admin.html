<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GINGA — אזור ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FDFBF7; --bg-outer:#EDE7DB; --green:#2D5A27; --green-2:#3B7233; --mustard:#E6A800; --mustard-2:#C98F00; --coral:#C0603D;
    --ink:#2C3E50; --muted:#6B7789; --line:rgba(44,62,80,.10);
    --glass:rgba(255,255,255,.6); --glass-2:rgba(255,255,255,.8); --glass-brd:rgba(255,255,255,.7);
    --pad:18px; --radius:16px; --shadow:0 8px 26px rgba(44,62,80,.08);
    --header-bg:linear-gradient(160deg, var(--green) 0%, #24471F 100%); --notch:var(--green); --sheet-bg:#FBF8F2; --nav-bg:#FBF8F2;
  }
  html[data-theme="dark"]{
    --bg:#0B0C0E; --bg-outer:#060607; --green:#5FA855; --green-2:#6FB865; --mustard:#E9B02A; --mustard-2:#F0BC3E; --coral:#E08157;
    --ink:#EAECEF; --muted:#8B93A0; --line:rgba(255,255,255,.09);
    --glass:rgba(255,255,255,.05); --glass-2:rgba(255,255,255,.08); --glass-brd:rgba(255,255,255,.10);
    --shadow:0 10px 30px rgba(0,0,0,.5); --header-bg:#111318; --notch:#0A0B0D; --sheet-bg:#131519; --nav-bg:#0A0B0D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  body{font-family:'Inter',-apple-system,Segoe UI,Arial,sans-serif; color:var(--ink); background:var(--bg-outer);
    display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:24px 12px}
  h1,h2,h3{font-weight:600}
  svg.lucide{width:1.25em; height:1.25em; stroke-width:2; vertical-align:middle}
  .phone{width:390px; max-width:100%; background:var(--bg); border-radius:38px; overflow:hidden;
    box-shadow:0 30px 70px rgba(44,62,80,.22); position:relative; height:840px; display:flex; flex-direction:column}
  .notch{height:26px; background:var(--notch); position:relative; z-index:30}
  .notch::after{content:""; position:absolute; top:6px; left:50%; transform:translateX(-50%); width:120px; height:18px; background:var(--notch); border-radius:0 0 14px 14px}

  .hdr{display:flex; align-items:center; gap:11px; padding:14px var(--pad); background:var(--header-bg); color:#F3F0E9}
  .hdr .back{cursor:pointer; color:#F3F0E9} .hdr .back svg{width:24px;height:24px}
  .hdr .ttl{font-size:18px; font-weight:600}
  .themebtn{margin-inline-start:auto; width:36px; height:36px; border-radius:11px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.2); color:#F3F0E9; display:flex; align-items:center; justify-content:center; cursor:pointer}
  .themebtn svg{width:18px;height:18px}

  .panel{flex:1; overflow-y:auto; padding:18px var(--pad) 24px; display:none}
  .panel.on{display:block}
  .panel::-webkit-scrollbar{display:none}
  .sub{font-size:13px; color:var(--muted); margin:-4px 2px 16px; line-height:1.5}

  .adminrow{display:flex; align-items:center; gap:14px; background:var(--glass); border:1px solid var(--glass-brd); border-radius:16px; padding:18px 16px; margin-bottom:13px; cursor:pointer; backdrop-filter:blur(10px); box-shadow:var(--shadow)}
  .adminrow .shield{width:44px; height:44px; border-radius:12px; background:rgba(45,90,39,.1); color:var(--green); display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  .adminrow .shield svg{width:22px;height:22px}
  .adminrow .rt{flex:1}
  .adminrow .rt b{font-size:16px; font-weight:600; color:var(--green); display:block}
  .adminrow .rt span{font-size:12.5px; color:var(--muted); margin-top:3px; display:block}
  .adminrow .ar{color:var(--muted)}

  .barh{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
  .barh b{font-size:16px; font-weight:600}
  .addbtn{display:flex; align-items:center; gap:6px; background:var(--green); color:#F3F0E9; border:none; border-radius:12px; padding:9px 14px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit}
  .addbtn svg{width:16px;height:16px}

  .item{display:flex; align-items:center; gap:12px; background:var(--glass); border:1px solid var(--glass-brd); border-radius:14px; padding:13px 14px; margin-bottom:10px; backdrop-filter:blur(8px)}
  .item .ii{flex:1; min-width:0}
  .item .ii b{font-size:14.5px; font-weight:600; display:flex; align-items:center; gap:7px; flex-wrap:wrap}
  .item .ii small{font-size:12px; color:var(--muted); margin-top:3px; display:block}
  .lvtag{font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:8px}
  .lv-קל{background:rgba(45,90,39,.12); color:var(--green)} .lv-בינוני{background:rgba(230,168,0,.16); color:var(--mustard-2)} .lv-קשה{background:rgba(192,96,61,.15); color:var(--coral)}
  .iacts{display:flex; gap:6px; flex:0 0 auto}
  .iacts button{width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:var(--glass-2); color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer}
  .iacts button svg{width:16px;height:16px}
  .iacts button.del{color:var(--coral); border-color:rgba(192,96,61,.3)}

  .overlay{position:absolute; inset:0; background:rgba(44,62,80,.4); opacity:0; pointer-events:none; transition:.25s; z-index:35; backdrop-filter:blur(2px)}
  .overlay.show{opacity:1; pointer-events:auto}
  .sheet{position:absolute; left:0; right:0; bottom:0; background:var(--sheet-bg); border-radius:24px 24px 0 0; transform:translateY(102%); transition:.3s cubic-bezier(.3,.8,.3,1); z-index:36; max-height:90%; overflow-y:auto}
  .sheet.show{transform:translateY(0)}
  .grab{width:44px; height:5px; background:var(--line); border-radius:3px; margin:12px auto 4px}
  .sbody{padding:8px var(--pad) 24px}
  .sh{text-align:center; font-size:17px; font-weight:600; margin-bottom:6px}
  .fl{font-size:12.5px; font-weight:600; color:var(--muted); margin:14px 2px 7px}
  input, select, textarea{width:100%; border:1px solid var(--line); border-radius:12px; padding:12px; font-size:14px; font-family:inherit; background:var(--glass-2); color:var(--ink); outline:none}
  input:focus, select:focus, textarea:focus{border-color:var(--green)}
  textarea{resize:none; height:70px; line-height:1.5}
  .save{width:100%; margin-top:20px; background:var(--green); color:#F3F0E9; border:none; border-radius:14px; padding:15px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit}

  .confbox{position:absolute; left:24px; right:24px; top:50%; transform:translateY(-50%) scale(.92); z-index:41; background:var(--sheet-bg); border:1px solid var(--line); border-radius:20px; padding:22px 18px; opacity:0; pointer-events:none; transition:.25s; box-shadow:0 16px 50px rgba(44,62,80,.3)}
  .confbox.show{opacity:1; pointer-events:auto; transform:translateY(-50%) scale(1)}
  .confbox .ch{text-align:center; font-size:18px; font-weight:600}
  .confbox .cs{text-align:center; font-size:13px; color:var(--muted); margin-top:6px; line-height:1.4}
  .cbtns{display:flex; gap:10px; margin-top:18px}
  .cbtns button{flex:1; padding:13px; border-radius:13px; border:none; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit}
  .cno{background:var(--glass); color:var(--muted); border:1px solid var(--line)}
  .cyes{background:var(--coral); color:#fff}
  .toast{position:absolute; bottom:30px; left:50%; transform:translateX(-50%) translateY(10px); z-index:50; background:#2C3E50; color:#F3F0E9; padding:12px 18px; border-radius:14px; font-size:13.5px; font-weight:500; opacity:0; transition:.3s}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="hdr">
    <span class="back" id="backBtn" onclick="back()"><i data-lucide="chevron-right"></i></span>
    <div class="ttl" id="httl">אזור ניהול</div>
    <button class="themebtn" onclick="toggleTheme()" aria-label="החלף מצב תצוגה"><i data-lucide="moon" id="themeIc"></i></button>
  </div>

  <!-- HOME -->
  <div class="panel on" id="pHome">
    <div class="sub">כלי ניהול לתוכן האפליקציה — הוספה, עריכה ומחיקה.</div>
    <div class="adminrow" onclick="openMgr('tricks')">
      <div class="shield"><i data-lucide="shield"></i></div>
      <div class="rt"><b>ניהול תרגילים</b><span>הוספה, עריכה ומחיקה של תרגילים</span></div>
      <div class="ar"><i data-lucide="chevron-left"></i></div>
    </div>
    <div class="adminrow" onclick="openMgr('spots')">
      <div class="shield"><i data-lucide="shield"></i></div>
      <div class="rt"><b>ניהול מיקומים</b><span>הוספה, עריכה ומחיקה של מיקומי משחק</span></div>
      <div class="ar"><i data-lucide="chevron-left"></i></div>
    </div>
  </div>

  <!-- TRICKS -->
  <div class="panel" id="pTricks">
    <div class="barh"><b>תרגילים</b><button class="addbtn" onclick="openEdit('trick')"><i data-lucide="plus"></i> הוסף תרגיל</button></div>
    <div id="tricksList"></div>
  </div>

  <!-- SPOTS -->
  <div class="panel" id="pSpots">
    <div class="barh"><b>מיקומי משחק</b><button class="addbtn" onclick="openEdit('spot')"><i data-lucide="plus"></i> הוסף מיקום</button></div>
    <div id="spotsList"></div>
  </div>

  <!-- edit sheet -->
  <div class="overlay" id="overlay" onclick="closeEdit()"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <div class="sbody">
      <div class="sh" id="editTitle">הוספה</div>
      <div id="editFields"></div>
      <button class="save" onclick="saveEdit()">שמור</button>
    </div>
  </div>

  <div class="overlay" id="confOv" onclick="closeConf()"></div>
  <div class="confbox" id="confBox">
    <div class="ch">למחוק?</div>
    <div class="cs" id="confSub">הפעולה אינה הפיכה.</div>
    <div class="cbtns"><button class="cno" onclick="closeConf()">ביטול</button><button class="cyes" onclick="doDelete()">מחק</button></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const $=s=>document.querySelector(s);
function icons(){ if(window.lucide) lucide.createIcons(); }
const LEVELS=["קל","בינוני","קשה"];
let TRICKS=[
  {name:"Double Touch", level:"קל", goal:"10 חזרות נקיות ברצף", xp:60},
  {name:"ראבונה באוויר", level:"קל", goal:"3 ביצועים נקיים", xp:80},
  {name:"צ'ינגה", level:"בינוני", goal:"רצף של 6 נגיעות", xp:110},
  {name:"חזה דבק", level:"בינוני", goal:"5 קבלות חזה", xp:110},
  {name:"סקורפיון", level:"בינוני", goal:"ביצוע נקי", xp:130},
  {name:"אלסטיקו", level:"קשה", goal:"3 ביצועים נקיים", xp:170},
];
let SPOTS=[
  {name:"חוף גורדון", area:"תל אביב", when:"כל יום 17:00–20:00"},
  {name:"חוף הילטון", area:"תל אביב", when:"סופי שבוע מהבוקר"},
  {name:"חוף אכדיה", area:"הרצליה", when:"שישי בבוקר"},
  {name:"חוף סירונית", area:"נתניה", when:"כל יום בערב"},
  {name:"חוף דדו", area:"חיפה", when:"סופי שבוע"},
];

let panel='home';
function show(p){ document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on')); $("#p"+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('on'); panel=p;
  $("#httl").textContent = p==='home'?'אזור ניהול': p==='tricks'?'ניהול תרגילים':'ניהול מיקומים'; icons(); }
function openMgr(t){ t==='tricks'?renderTricks():renderSpots(); show(t); }
function back(){ if(panel==='home'){ location.href='altinha-profile.html'; } else { show('home'); } }

function renderTricks(){
  const w=$("#tricksList"); w.innerHTML="";
  TRICKS.forEach((t,i)=>{
    const el=document.createElement('div'); el.className='item';
    el.innerHTML=`<div class="ii"><b>${t.name} <span class="lvtag lv-${t.level}">${t.level}</span></b><small>${t.goal} · ${t.xp} XP</small></div>
      <div class="iacts"><button onclick="openEdit('trick',${i})" aria-label="ערוך"><i data-lucide="pencil"></i></button>
      <button class="del" onclick="del('trick',${i})" aria-label="מחק"><i data-lucide="trash-2"></i></button></div>`;
    w.appendChild(el);
  });
  icons();
}
function renderSpots(){
  const w=$("#spotsList"); w.innerHTML="";
  SPOTS.forEach((s,i)=>{
    const el=document.createElement('div'); el.className='item';
    el.innerHTML=`<div class="ii"><b>${s.name}</b><small>${s.area} · ${s.when}</small></div>
      <div class="iacts"><button onclick="openEdit('spot',${i})" aria-label="ערוך"><i data-lucide="pencil"></i></button>
      <button class="del" onclick="del('spot',${i})" aria-label="מחק"><i data-lucide="trash-2"></i></button></div>`;
    w.appendChild(el);
  });
  icons();
}
let pendingDel=null;
function del(type,i){ pendingDel={type,i}; const name = type==='trick'?TRICKS[i].name:SPOTS[i].name;
  $("#confSub").textContent = `"${name}" יימחק. הפעולה אינה הפיכה.`;
  $("#confOv").classList.add('show'); $("#confBox").classList.add('show'); }
function closeConf(){ $("#confOv").classList.remove('show'); $("#confBox").classList.remove('show'); }
function doDelete(){ if(!pendingDel)return; const {type,i}=pendingDel; if(type==='trick'){ TRICKS.splice(i,1); renderTricks(); } else { SPOTS.splice(i,1); renderSpots(); } closeConf(); toast(type==='trick'?'התרגיל נמחק':'המיקום נמחק'); pendingDel=null; }

let editType='trick', editIdx=null;
function openEdit(type,idx=null){
  editType=type; editIdx=idx;
  const isTrick=type==='trick'; const item = idx!=null ? (isTrick?TRICKS[idx]:SPOTS[idx]) : null;
  $("#editTitle").textContent = (idx!=null?'עריכת ':'הוספת ') + (isTrick?'תרגיל':'מיקום');
  let html='';
  if(isTrick){
    html=`<div class="fl">שם התרגיל</div><input id="f_name" value="${item?item.name:''}" placeholder="לדוגמה: סקורפיון">
      <div class="fl">רמה</div><select id="f_level">${LEVELS.map(l=>`<option ${item&&item.level===l?'selected':''}>${l}</option>`).join('')}</select>
      <div class="fl">יעד</div><input id="f_goal" value="${item?item.goal:''}" placeholder="לדוגמה: 10 חזרות ברצף">
      <div class="fl">נקודות (XP)</div><input id="f_xp" type="number" value="${item?item.xp:100}">`;
  } else {
    html=`<div class="fl">שם המיקום</div><input id="f_name" value="${item?item.name:''}" placeholder="לדוגמה: חוף גורדון">
      <div class="fl">אזור</div><input id="f_area" value="${item?item.area:''}" placeholder="לדוגמה: תל אביב">
      <div class="fl">שעות פעילות</div><input id="f_when" value="${item?item.when:''}" placeholder="לדוגמה: כל יום 17:00–20:00">`;
  }
  $("#editFields").innerHTML=html;
  $("#overlay").classList.add('show'); $("#sheet").classList.add('show'); icons();
}
function closeEdit(){ $("#overlay").classList.remove('show'); $("#sheet").classList.remove('show'); }
function saveEdit(){
  const name=$("#f_name").value.trim(); if(!name){ toast('נא למלא שם'); return; }
  if(editType==='trick'){
    const obj={name, level:$("#f_level").value, goal:$("#f_goal").value.trim()||'—', xp:+$("#f_xp").value||0};
    if(editIdx!=null) TRICKS[editIdx]=obj; else TRICKS.push(obj);
    renderTricks();
  } else {
    const obj={name, area:$("#f_area").value.trim()||'—', when:$("#f_when").value.trim()||'—'};
    if(editIdx!=null) SPOTS[editIdx]=obj; else SPOTS.push(obj);
    renderSpots();
  }
  closeEdit(); toast(editIdx!=null?'נשמר':'נוסף בהצלחה');
}

function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); try{localStorage.setItem('ginga-theme',t)}catch(e){}
  const ic=document.getElementById('themeIc'); if(ic){ ic.setAttribute('data-lucide', t==='dark'?'sun':'moon'); } icons(); }
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'brazil'; applyTheme(cur==='dark'?'brazil':'dark'); }
(function(){ let t='brazil'; try{ t=localStorage.getItem('ginga-theme')||'brazil'; }catch(e){} applyTheme(t); })();
let tT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),1700); }
i
