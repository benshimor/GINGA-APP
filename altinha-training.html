<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GINGA — תרגול</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FDFBF7; --bg-outer:#EDE7DB; --green:#2D5A27; --green-2:#3B7233; --mustard:#E6A800; --mustard-2:#C98F00;
    --ink:#2C3E50; --muted:#6B7789; --line:rgba(44,62,80,.10);
    --glass:rgba(255,255,255,.55); --glass-2:rgba(255,255,255,.75); --glass-brd:rgba(255,255,255,.7);
    --pad:20px; --gap:14px; --radius:16px; --shadow:0 8px 26px rgba(44,62,80,.08);
    --body-bg:radial-gradient(120% 60% at 50% 0%, #E9F0E4 0%, transparent 55%), var(--bg-outer);
    --header-bg:linear-gradient(160deg, var(--green) 0%, #24471F 100%); --notch:var(--green);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  body{font-family:'Inter',-apple-system,Segoe UI,Arial,sans-serif; color:var(--ink); background:var(--body-bg); display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:24px 12px}
  
  .phone{width:390px; max-width:100%; background:var(--bg); border-radius:38px; overflow:hidden; box-shadow:0 30px 70px rgba(44,62,80,.22); position:relative; height:840px; display:flex; flex-direction:column}
  .notch{height:26px; background:var(--notch); position:relative; z-index:30}
  .notch::after{content:""; position:absolute; top:6px; left:50%; transform:translateX(-50%); width:120px; height:18px; background:var(--notch); border-radius:0 0 14px 14px}

  /* התאמתי את המחלקות למבנה ה-CSS המקורי שלך */
  .top{display:flex; align-items:center; gap:12px; padding:14px var(--pad); background:var(--header-bg); color:#F3F0E9}
  .brand{display:flex; align-items:center; gap:9px; flex:1}
  .brand img{width:30px; height:30px}
  .brand span{font-size:19px; font-weight:600}
  
  .body{flex:1; overflow-y:auto; padding:16px var(--pad) 96px}
  .body::-webkit-scrollbar{display:none}
  .secttitle{font-size:19px; font-weight:600; margin:10px 0 18px}

  /* שאר העיצובים נשארו תואמים למבנה שלך */
  .xpcard{margin-bottom:20px; background:var(--glass); border:1px solid var(--glass-brd); border-radius:var(--radius); padding:14px 16px}
  .levels{display:flex; gap:10px; margin-bottom:20px}
  .ltab{padding:8px 16px; border-radius:20px; background:var(--glass); border:1px solid var(--line); font-size:14px; cursor:pointer}
  .ltab.active{background:var(--green); color:#fff}
  
  .nav{position:absolute; bottom:0; left:0; right:0; height:70px; background:var(--bg); border-top:1px solid var(--line); display:flex; justify-content:space-around; align-items:center; padding-bottom:6px; z-index:20}
  .nav a{display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; color:var(--muted); text-decoration:none}
  .fab{width:54px; height:54px; border-radius:50%; background:#2D5A27; color:#fff; display:flex; align-items:center; justify-content:center; margin-top:-22px}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Header מתוקן -->
  <div class="top">
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <span>GINGA</span>
    </div>
  </div>

  <div class="body">
    <div class="secttitle">הדרך שלך לפריסטייל</div>
    <div class="xpcard">
        <div style="font-size:13px; margin-bottom:5px">רמה 3 · מתחיל+</div>
        <div class="bar"><i id="xpbar" style="width:64%"></i></div>
    </div>

    <div class="levels" id="levels">
      <div class="ltab active" data-l="0">קל</div>
      <div class="ltab" data-l="1">בינוני</div>
      <div class="ltab" data-l="2">קשה</div>
    </div>

    <div id="nodes"></div>
  </div>

  <!-- Nav מתוקן -->
  <div class="nav">
    <a href="index.html" class="on"><i data-lucide="book-open"></i>תרגול</a>
    <a href="altinha-feed.html"><i data-lucide="activity"></i>פעילות</a>
    <a class="fab" href="altinha-welcome.html"><i data-lucide="plus"></i></a>
    <a href="altinha-map.html"><i data-lucide="map-pin"></i>מפה</a>
    <a href="altinha-profile.html"><i data-lucide="user"></i>פרופיל</a>
  </div>
</div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
