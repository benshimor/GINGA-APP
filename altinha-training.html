<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GINGA — תרגול</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FDFBF7; --bg-outer:#EDE7DB; --green:#2D5A27; --green-2:#3B7233; --mustard:#E6A800; --mustard-2:#C98F00;
    --ink:#2C3E50; --muted:#6B7789; --line:rgba(44,62,80,.10);
    --glass:rgba(255,255,255,.55); --glass-2:rgba(255,255,255,.75); --glass-brd:rgba(255,255,255,.7);
    --pad:20px; --gap:14px; --radius:16px; --shadow:0 8px 26px rgba(44,62,80,.08);
    --body-bg:radial-gradient(120% 60% at 50% 0%, #E9F0E4 0%, transparent 55%), var(--bg-outer);
    --header-bg:linear-gradient(160deg, var(--green) 0%, #24471F 100%); --notch:var(--green);
  }
  html[data-theme="dark"]{
    --bg:#0B0C0E; --bg-outer:#060607; --green:#5FA855; --green-2:#6FB865; --mustard:#E9B02A; --mustard-2:#F0BC3E;
    --ink:#EAECEF; --muted:#8B93A0; --line:rgba(255,255,255,.09);
    --glass:rgba(255,255,255,.045); --glass-2:rgba(255,255,255,.075); --glass-brd:rgba(255,255,255,.10);
    --shadow:0 10px 30px rgba(0,0,0,.5);
    --body-bg:#050506; --header-bg:#111318; --notch:#0A0B0D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  body{font-family:'Inter',-apple-system,Segoe UI,Arial,sans-serif; color:var(--ink);
    background:var(--body-bg);
    display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:24px 12px}
  h1,h2,h3{font-weight:600}
  svg.lucide{width:1.25em; height:1.25em; stroke-width:2; vertical-align:middle}

  .phone{width:390px; max-width:100%; background:var(--bg); border-radius:38px; overflow:hidden;
    box-shadow:0 30px 70px rgba(44,62,80,.22); position:relative; height:840px; display:flex; flex-direction:column}
  .notch{height:26px; background:var(--notch); position:relative; z-index:30}
  .notch::after{content:""; position:absolute; top:6px; left:50%; transform:translateX(-50%); width:120px; height:18px; background:var(--notch); border-radius:0 0 14px 14px}

  .topbar{padding:16px var(--pad) 20px; background:var(--header-bg); color:#F3F0E9}
  .brandbar{display:flex; align-items:center; gap:10px; margin-bottom:16px}
  .brandbar img{width:34px; height:34px}
  .brandbar span{font-size:20px; font-weight:600; letter-spacing:.5px}
  .themebtn{margin-inline-start:auto; width:38px; height:38px; border-radius:12px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.2); color:#F3F0E9; display:flex; align-items:center; justify-content:center; cursor:pointer}
  .themebtn svg{width:19px; height:19px}
  .toprow{display:flex; align-items:center; justify-content:space-between}
  .hello{font-size:13px; opacity:.8}
  .name{font-size:19px; font-weight:700; margin-top:2px}
  .stats{display:flex; gap:10px}
  .chip{display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.18);
    border-radius:12px; padding:8px 12px; font-size:14px; font-weight:600}
  .chip svg{width:16px; height:16px}
  .chip.mustard{color:var(--mustard)}

  .xpcard{margin-top:18px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); border-radius:var(--radius); padding:14px 16px}
  .xpmeta{display:flex; justify-content:space-between; align-items:center; font-size:13px; opacity:.85; margin-bottom:9px}
  .xpmeta b{font-size:14px; opacity:1; font-weight:700}
  .bar{height:10px; background:rgba(255,255,255,.2); border-radius:6px; overflow:hidden}
  .bar > i{display:block; height:100%; width:64%; background:var(--mustard); border-radius:6px}

  .body{flex:1; overflow-y:auto; padding:var(--pad) var(--pad) 96px}
  .body::-webkit-scrollbar{display:none}
  .secttitle{font-size:19px; font-weight:600; margin:6px 0 18px}

  .levels{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px}
  .levels::-webkit-scrollbar{display:none}
  .ltab{flex:0 0 auto; padding:9px 18px; border-radius:22px; background:var(--glass); border:1px solid var(--line);
    font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap; backdrop-filter:blur(8px)}
  .ltab.active{background:var(--green); color:#F3F0E9; border-color:var(--green)}

  .path{position:relative; padding:4px 0}
  .rail{position:absolute; right:27px; top:8px; bottom:8px; width:2px; background:var(--line); z-index:0}
  .node{display:flex; gap:16px; align-items:center; position:relative; padding-bottom:var(--gap); cursor:pointer}
  .dot{flex:0 0 auto; width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    z-index:1; background:var(--glass-2); border:1px solid var(--line); box-shadow:var(--shadow)}
  .dot svg{width:22px; height:22px; color:var(--muted)}
  .dot.done{background:var(--green); border-color:var(--green)} .dot.done svg{color:#F3F0E9}
  .dot.curr{background:var(--mustard); border-color:var(--mustard)} .dot.curr svg{color:#3a2a00}
  .dot.open{background:var(--glass-2); border-color:var(--green)} .dot.open svg{color:var(--green)}

  .card{flex:1; background:var(--glass); border:1px solid var(--glass-brd); border-radius:var(--radius); padding:14px 16px;
    display:flex; gap:14px; align-items:center; backdrop-filter:blur(12px); box-shadow:var(--shadow)}
  .card.locked{opacity:.55}
  .thumb{flex:0 0 auto; width:58px; height:58px; border-radius:13px; background:#E4E9E1; overflow:hidden; position:relative; border:1px solid var(--line)}
  .thumb video{width:100%; height:100%; object-fit:cover}
  .thumb .pl{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; background:rgba(44,62,80,.22)}
  .thumb .pl svg{width:18px; height:18px}
  .cinfo{flex:1; min-width:0}
  .ctitle{font-weight:700; font-size:15px}
  .csub{font-size:12.5px; color:var(--muted); margin-top:6px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .pill{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:11px}
  .pill svg{width:13px; height:13px}
  .pill.goal{background:rgba(230,168,0,.14); color:var(--mustard-2)}
  .pill.done{background:rgba(45,90,39,.12); color:var(--green)}
  .pill.curr{background:rgba(230,168,0,.16); color:var(--mustard-2)}
  .xp{font-size:12px; font-weight:700; color:var(--green)}

  .nav{position:absolute; bottom:0; left:0; right:0; height:70px; background:var(--bg);
    border-top:1px solid var(--line); display:flex; justify-content:space-around; align-items:center; padding-bottom:6px; z-index:20}
  .nav a{display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; color:var(--muted); text-decoration:none; font-weight:600; cursor:pointer}
  .nav a svg{width:23px; height:23px}
  .nav a.on{color:var(--green)}
  .fab{width:54px; height:54px; border-radius:50%; background:#2D5A27; color:#F3F0E9; display:flex; align-items:center; justify-content:center; margin-top:-22px; box-shadow:0 6px 18px rgba(0,0,0,.28); text-decoration:none; border:none; cursor:pointer}
  .fab svg{width:27px; height:27px; color:#fff; stroke-width:2.75}

  .overlay{position:absolute; inset:0; background:rgba(44,62,80,.4); opacity:0; pointer-events:none; transition:.25s; z-index:20; backdrop-filter:blur(2px)}
  .overlay.show{opacity:1; pointer-events:auto}
  .sheet{position:absolute; left:0; right:0; bottom:0; background:var(--bg); border-radius:26px 26px 0 0;
    transform:translateY(102%); transition:.3s cubic-bezier(.3,.8,.3,1); z-index:21; max-height:92%; overflow-y:auto; box-shadow:0 -10px 40px rgba(44,62,80,.18)}
  .sheet.show{transform:translateY(0)}
  .grab{width:44px; height:5px; background:var(--line); border-radius:3px; margin:12px auto 4px}
  .video{position:relative; margin:8px var(--pad) 0; border-radius:18px; overflow:hidden; background:#E4E9E1; aspect-ratio:9/12; border:1px solid var(--line)}
  .video video{width:100%; height:100%; object-fit:contain; display:block}
  .vph{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; padding:20px; cursor:pointer; background:rgba(44,62,80,.28); color:#fff}
  .vph .play{width:66px; height:66px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(45,90,39,.45)}
  .vph .play svg{width:28px; height:28px; color:#fff}
  .vph small{font-size:12.5px; opacity:.9}
  .sheetbody{padding:18px var(--pad) 26px}
  .dtitle{font-size:22px; font-weight:600}
  .dmeta{display:flex; gap:8px; margin:10px 0 16px; flex-wrap:wrap}
  .h{font-size:14px; font-weight:700; color:var(--green); margin:18px 0 7px}
  .desc{font-size:14px; line-height:1.65; color:var(--ink)}
  .miss{background:rgba(230,168,0,.08); border:1px solid rgba(230,168,0,.25); border-radius:14px; padding:12px 14px; font-size:13.5px; color:#8a6a10; line-height:1.6}
  .goalbox{background:var(--glass); border:1px solid var(--glass-brd); border-radius:16px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; margin-top:8px; backdrop-filter:blur(8px)}
  .goalbox b{font-size:15px}
  .reps{display:flex; align-items:center; gap:12px}
  .reps button{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--glass-2); font-size:19px; font-weight:700; color:var(--green); cursor:pointer}
  .reps span{min-width:52px; text-align:center; font-weight:800; font-size:17px}
  .actions{display:flex; gap:12px; margin-top:22px}
  .btn{flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:15px; border-radius:15px; border:none; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit}
  .btn svg{width:18px; height:18px}
  .btn.primary{background:var(--green); color:#F3F0E9}
  .btn.ghost{background:var(--glass-2); color:var(--green); border:1.5px solid var(--green)}
  .btn:disabled{opacity:.5}

  .toast{position:absolute; top:76px; left:50%; transform:translateX(-50%) translateY(-16px); z-index:40;
    background:#2C3E50; color:#F3F0E9; padding:12px 20px; border-radius:14px; font-size:14px; font-weight:600; opacity:0; transition:.3s; box-shadow:var(--shadow)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .note{font-size:12px; color:var(--muted); text-align:center; margin:18px var(--pad) 0; line-height:1.55}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <div class="topbar">
    <div class="brandbar"><img src="logo.png" alt=""><span>GINGA</span>
      <button class="themebtn" id="themeBtn" onclick="toggleTheme()" aria-label="החלף מצב תצוגה"><i data-lucide="moon" id="themeIc"></i></button>
    </div>
    <div class="toprow">
      <div>
        <div class="hello">בוקר טוב,</div>
        <div class="name" style="font-weight:600">נועה</div>
      </div>
      <div class="stats">
        <div class="chip mustard"><i data-lucide="flame"></i><span id="streak">5</span></div>
        <div class="chip"><i data-lucide="zap"></i><span id="xp">320</span></div>
      </div>
    </div>
    <div class="xpcard">
      <div class="xpmeta"><b>רמה 3 · מתחיל+</b><span id="xpgoal">320 / 500 XP</span></div>
      <div class="bar"><i id="xpbar"></i></div>
    </div>
  </div>

  <div class="body">
    <div class="secttitle">הדרך שלך לפריסטייל</div>

    <div class="levels" id="levels">
      <div class="ltab active" data-l="0">קל</div>
      <div class="ltab" data-l="1">בינוני</div>
      <div class="ltab" data-l="2">קשה</div>
    </div>

    <div class="path">
      <div class="rail"></div>
      <div id="nodes"></div>
    </div>

    <div class="note">הסרטונים נטענים ישירות מתיקיית "תרגילים" שלך.</div>
  </div>

  <div class="nav">
    <a class="on"><i data-lucide="book-open"></i>תרגול</a>
    <a href="altinha-feed.html"><i data-lucide="activity"></i>פעילות</a>
    <a class="fab" href="altinha-feed.html"><i data-lucide="plus"></i></a>
    <a href="altinha-map.html"><i data-lucide="map-pin"></i>מפה</a>
    <a href="altinha-profile.html"><i data-lucide="user"></i>פרופיל</a>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <div class="video">
      <video id="vid" playsinline controls preload="metadata"></video>
      <div class="vph" id="vph" onclick="playVid()">
        <div class="play"><i data-lucide="play"></i></div>
        <div id="vlabel" style="font-weight:600">צפה בהדגמה</div>
        <small>לחץ לניגון הסרטון</small>
      </div>
    </div>
    <div class="sheetbody">
      <div class="dtitle" id="dtitle">—</div>
      <div class="dmeta" id="dmeta"></div>
      <div class="h">איך עושים</div>
      <div class="desc" id="ddesc"></div>
      <div class="h">טעויות נפוצות</div>
      <div class="miss" id="dmiss"></div>
      <div class="h">היעד שלך</div>
      <div class="goalbox">
        <div><b id="dgoal">—</b><div style="font-size:12px;color:var(--muted)">סמן כמה השלמת</div></div>
        <div class="reps">
          <button onclick="rep(-1)">−</button><span id="repn">0</span><button onclick="rep(1)">＋</button>
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost" onclick="uploadClip()"><i data-lucide="share-2"></i> שתף</button>
        <button class="btn primary" id="donebtn" onclick="complete()"><i data-lucide="check"></i> סמן כהושלם</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const LEVELS = [
  { name:"קל", tricks:[
    {t:"Double Touch", v:"videos/double-touch.mp4",
      d:"שתי נגיעות מהירות באותה רגל — הראשונה מזיזה את הכדור הצידה, השנייה שולטת ומחזירה. בסיס לשליטה ולשינוי כיוון.",
      miss:"נגיעה ראשונה חזקה מדי שמרחיקה את הכדור · גוף נוקשה במקום ברכיים רכות.",
      goal:"10 חזרות נקיות ברצף", xp:60, st:"curr"},
    {t:"ראבונה באוויר", v:"videos/rabona.mp4",
      d:"בעיטת ראבונה — הרגל הבועטת חוצה מאחורי רגל העמידה ומכה את הכדור באוויר. דורש תזמון וקואורדינציה.",
      miss:"מנסים מוקדם מדי לפני שהכדור באוויר · משקל גוף לא יציב על רגל העמידה.",
      goal:"3 ביצועים נקיים", xp:80, st:"open"},
  ]},
  { name:"בינוני", tricks:[
    {t:"צ'ינגה", v:"videos/chinga.mp4",
      d:"תנועת הטעיה/שליטה רציפה לשמירת הכדור באוויר תוך כדי תנועה. דגש על קצב וזרימה.",
      miss:"ממהרים בין הנגיעות · מאבדים את הכדור מקו הגוף.",
      goal:"רצף של 6 נגיעות", xp:110, st:"lock"},
    {t:"חזה דבק", v:"videos/chest.mp4",
      d:"קבלת כדור גבוה והצמדתו לחזה (\"דבק\") — ריכוך מלא והורדה מבוקרת לרגל בלי שהכדור יקפוץ.",
      miss:"חזה זקוף שמקפיץ את הכדור · לא נוטים מעט לאחור לרכך.",
      goal:"5 קבלות חזה ← רגל", xp:110, st:"lock"},
    {t:"סקורפיון", v:"videos/scorpion.mp4",
      d:"בעיטת עקרב — הגוף נוטה קדימה והרגל מכה את הכדור מאחורי הגב. טריק ראווה שדורש גמישות וביטחון.",
      miss:"לא נוטים מספיק קדימה · מתזמנים את הבעיטה מאוחר.",
      goal:"ביצוע נקי ×1", xp:130, st:"lock"},
  ]},
  { name:"קשה", tricks:[
    {t:"אלסטיקו", v:"videos/elastico.mp4",
      d:"הטעיית אלסטיקו — דחיפת הכדור החוצה עם חוץ כף הרגל ומיד החזרתו פנימה בתנועה אחת מהירה. מהלך ההטעיה הקלאסי.",
      miss:"תנועה איטית שמאבדת את אפקט ההפתעה · נגיעה אחת במקום שתיים רציפות.",
      goal:"3 ביצועים נקיים", xp:170, st:"lock"},
  ]},
];
const ICON={done:'check', curr:'play', open:'circle', lock:'lock'};
let curLevel=0, curTrick=null, state={xp:320};
const $ = s=>document.querySelector(s);
const vurl = p => encodeURI("./"+p);
function icons(){ if(window.lucide) lucide.createIcons(); }

function setBar(){ $("#xpbar").style.width = Math.min(100,(state.xp/500)*100)+"%"; $("#xp").textContent=state.xp; $("#xpgoal").textContent=state.xp+" / 500 XP"; }
setBar();

function render(){
  const wrap=$("#nodes"); wrap.innerHTML="";
  LEVELS[curLevel].tricks.forEach((tr,i)=>{
    const cls = tr.st==="done"?"done": tr.st==="curr"?"curr": tr.st==="lock"?"lock":"open";
    const node=document.createElement("div"); node.className="node";
    const thumb = tr.st==="lock"
      ? `<div class="thumb"><div class="pl"><i data-lucide="lock"></i></div></div>`
      : `<div class="thumb"><video src="${vurl(tr.v)}#t=0.5" muted preload="metadata"></video><div class="pl"><i data-lucide="play"></i></div></div>`;
    node.innerHTML=`
      <div class="dot ${cls}"><i data-lucide="${ICON[tr.st]||'circle'}"></i></div>
      <div class="card ${tr.st==='lock'?'locked':''}">
        ${thumb}
        <div class="cinfo">
          <div class="ctitle">${tr.t}</div>
          <div class="csub">
            <span class="pill goal"><i data-lucide="target"></i>${tr.goal}</span>
            <span class="xp">+${tr.xp} XP</span>
            ${tr.st==="done"?'<span class="pill done">הושלם</span>':''}
            ${tr.st==="curr"?'<span class="pill curr">ממשיכים מכאן</span>':''}
          </div>
        </div>
      </div>`;
    if(tr.st!=="lock") node.onclick=()=>openSheet(i);
    else node.onclick=()=>toast("השלם את הטריקים הקודמים כדי לפתוח");
    wrap.appendChild(node);
  });
  icons();
}
render();

$("#levels").addEventListener("click",e=>{
  const t=e.target.closest(".ltab"); if(!t)return;
  document.querySelectorAll(".ltab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); curLevel=+t.dataset.l; render();
});

let reps=0;
function openSheet(i){
  curTrick=i; reps=0; const tr=LEVELS[curLevel].tricks[i];
  $("#dtitle").textContent=tr.t; $("#vlabel").textContent="הדגמה: "+tr.t;
  $("#ddesc").textContent=tr.d; $("#dmiss").textContent=tr.miss; $("#dgoal").textContent=tr.goal; $("#repn").textContent="0";
  $("#dmeta").innerHTML=`<span class="pill goal">${LEVELS[curLevel].name}</span><span class="pill curr">+${tr.xp} XP</span>${tr.st==='done'?'<span class="pill done">הושלם</span>':''}`;
  const btn=$("#donebtn");
  if(tr.st==="done"){btn.disabled=true;} else {btn.disabled=false;}
  const v=$("#vid"); v.src=vurl(tr.v); v.load(); $("#vph").style.display="flex";
  $("#overlay").classList.add("show"); $("#sheet").classList.add("show"); icons();
}
function playVid(){ const v=$("#vid"); $("#vph").style.display="none"; v.play(); }
function closeSheet(){ $("#overlay").classList.remove("show"); $("#sheet").classList.remove("show"); const v=$("#vid"); v.pause(); }
$("#overlay").onclick=closeSheet;
function rep(d){ reps=Math.max(0,reps+d); $("#repn").textContent=reps; }
function complete(){
  const tr=LEVELS[curLevel].tricks[curTrick]; if(tr.st==="done") return;
  tr.st="done"; state.xp+=tr.xp; setBar();
  const next=LEVELS[curLevel].tricks[curTrick+1];
  if(next && (next.st==="lock"||next.st==="open")) next.st="curr";
