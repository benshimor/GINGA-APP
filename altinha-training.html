<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GINGA — תרגול</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FDFBF7; --bg-outer:#EDE7DB; --green:#2D5A27; --green-2:#3B7233; --mustard:#E6A800; --ink:#2C3E50; --muted:#6B7789; --line:rgba(44,62,80,.10);
    --glass:rgba(255,255,255,.55); --glass-2:rgba(255,255,255,.75); --glass-brd:rgba(255,255,255,.7); --shadow:0 8px 26px rgba(44,62,80,.08);
    --header-bg:linear-gradient(160deg, var(--green) 0%, #24471F 100%);
  }
  html[data-theme="dark"]{
    --bg:#0B0C0E; --bg-outer:#060607; --green:#5FA855; --ink:#EAECEF; --muted:#8B93A0; --line:rgba(255,255,255,.09);
    --glass:rgba(255,255,255,.045); --glass-2:rgba(255,255,255,.075); --glass-brd:rgba(255,255,255,.10); --header-bg:#111318;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:'Inter',sans-serif; background:var(--bg-outer); color:var(--ink); display:flex; justify-content:center; min-height:100vh; padding:24px 12px}
  .phone{width:390px; background:var(--bg); border-radius:38px; overflow:hidden; position:relative; height:840px; display:flex; flex-direction:column}
  
  /* Topbar & Theme */
  .top{padding:16px 20px 20px; background:var(--header-bg); color:#fff; display:flex; justify-content:space-between; align-items:center}
  .brand{display:flex; align-items:center; gap:10px; font-weight:600}
  .themebtn{background:rgba(255,255,255,.14); border:none; padding:8px; border-radius:10px; color:#fff; cursor:pointer}
  
  .body{flex:1; overflow-y:auto; padding:20px}
  .secttitle{font-size:19px; font-weight:600; margin-bottom:15px}
  
  /* Levels & Path */
  .levels{display:flex; gap:10px; margin-bottom:20px}
  .ltab{padding:8px 16px; border-radius:20px; background:var(--glass); border:1px solid var(--line); cursor:pointer}
  .ltab.active{background:var(--green); color:#fff}
  .node{display:flex; gap:15px; margin-bottom:15px; cursor:pointer}
  .dot{width:50px; height:50px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center}
  .card{flex:1; background:var(--glass); padding:15px; border-radius:15px; border:1px solid var(--line)}
  
  .nav{height:70px; border-top:1px solid var(--line); display:flex; justify-content:space-around; align-items:center; background:var(--bg)}
  .fab{background:var(--green); color:#fff; padding:15px; border-radius:50%; margin-top:-30px}
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <div class="brand">GINGA</div>
    <button class="themebtn" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
  </div>

  <div class="body">
    <div class="secttitle">תרגול</div>
    <div class="levels" id="levels">
      <div class="ltab active" data-l="0">קל</div>
      <div class="ltab" data-l="1">בינוני</div>
    </div>
    <div id="nodes"></div>
  </div>

  <div class="nav">
    <a href="#"><i data-lucide="book-open"></i></a>
    <a class="fab" href="#"><i data-lucide="plus"></i></a>
    <a href="#"><i data-lucide="user"></i></a>
  </div>
</div>

<script>
  const LEVELS = [
    { name:"קל", tricks:[{t:"Double Touch"}, {t:"ראבונה"}]},
    { name:"בינוני", tricks:[{t:"צ'ינגה"}, {t:"חזה דבק"}]}
  ];
  
  function render() {
    const wrap = document.getElementById("nodes");
    wrap.innerHTML = "";
    const activeL = document.querySelector(".ltab.active").dataset.l;
    LEVELS[activeL].tricks.forEach(tr => {
      wrap.innerHTML += `
        <div class="node">
          <div class="dot"><i data-lucide="play"></i></div>
          <div class="card">${tr.t}</div>
        </div>`;
    });
    lucide.createIcons();
  }

  function toggleTheme() {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === "dark" ? "" : "dark";
  }

  document.getElementById("levels").addEventListener("click", e => {
    if(!e.target.classList.contains("ltab")) return;
    document.querySelectorAll(".ltab").forEach(x=>x.classList.remove("active"));
    e.target.classList.add("active");
    render();
  });

  render();
</script>
</body>
</html>
